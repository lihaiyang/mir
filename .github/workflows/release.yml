name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifacts to (e.g. v0.1.7)'
        required: true
        default: 'v0.1.7'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: mac-arm64
            build_cmd: npm run rebuild && npm run build && npx electron-builder --mac --arm64 --publish=never
            artifact_glob: release/*.dmg
          - os: windows-latest
            name: win-x64
            build_cmd: npx electron-rebuild -f -w node-pty && npm run build && npx electron-builder --win --x64 --publish=never
            artifact_glob: release/*.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Configure VS toolchain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # @electron/node-gyp's PowerShell VS auto-detection crashes on this
          # image (ERR_CHILD_PROCESS_STDIO_MAXB). Point it straight at VS2022
          # via VCINSTALLDIR / GYP_MSVS_VERSION so it skips detection entirely.
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Write-Host "VS install: $vs"
          $vc = Join-Path $vs 'VC'
          echo "VCINSTALLDIR=$vc" >> $env:GITHUB_ENV
          echo "GYP_MSVS_VERSION=2022" >> $env:GITHUB_ENV

      - name: Build & package (${{ matrix.name }})
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release upload "$TAG" ${{ matrix.artifact_glob }} --clobber
