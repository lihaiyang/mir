name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifacts to (e.g. v0.2.0)'
        required: true
        default: 'v0.2.0'
  push:
    tags:
      - 'v*'
      - 'dev-*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build & package
        run: npm run rebuild && npm run build && npx electron-builder --mac --arm64 --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # Dev tags (dev-*) are marked as prerelease to keep them out of
          # /releases/latest (which only returns non-prerelease). Stable
          # tags (v*) are regular releases.
          if [[ "$TAG" == dev-* ]]; then
            gh release create "$TAG" --generate-notes --prerelease --target "$GITHUB_SHA" 2>/dev/null || true
          else
            gh release create "$TAG" --generate-notes --target "$GITHUB_SHA" 2>/dev/null || true
          fi
          gh release upload "$TAG" release/*.dmg release/*-mac.zip release/*-mac.zip.blockmap --clobber
