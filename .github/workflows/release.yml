name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach artifacts to (e.g. v0.1.7)'
        required: true
        default: 'v0.1.7'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: mac-arm64
            build_cmd: npm run rebuild && npm run build && npx electron-builder --mac --arm64 --publish=never
            artifact_glob: release/*.dmg
          - os: windows-2022
            name: win-x64
            build_cmd: node scripts/patch-node-gyp.js && npm config set python python && npx electron-rebuild -f -w node-pty && npm run build && npx electron-builder --win --x64 --publish=never
            artifact_glob: release/*.exe

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python (Windows, for node-gyp)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build & package (${{ matrix.name }})
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release upload "$TAG" ${{ matrix.artifact_glob }} --clobber
